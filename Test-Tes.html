<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST Firebase</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; }
        .log { background: #16213e; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; font-size: 13px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h1>🔍 Firebase Diagnostic Test</h1>
    
    <button onclick="test1()">Test 1: Cek Konfigurasi</button>
    <button onclick="test2()">Test 2: Cek Auth</button>
    <button onclick="test3()">Test 3: Cek Login Google</button>
    
    <div id="logs"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = '> ' + msg;
            document.getElementById('logs').prepend(div);
            console.log(msg);
        }

        function test1() {
            log('📋 TEST 1: Cek Konfigurasi Firebase');
            
            try {
                const config = {
                    apiKey: "AIzaSyDl9TVQ9B6G-PY6PtQJjyPkrqDMqeMhkrE",
                    authDomain: "wa-clone-rafly.firebaseapp.com",
                    projectId: "wa-clone-rafly",
                    storageBucket: "wa-clone-rafly.firebasestorage.app",
                    messagingSenderId: "217952329083",
                    appId: "1:217952329083:web:644aafe82e9b40794b31de"
                };
                
                log('Config: ' + JSON.stringify(config, null, 2));
                
                // Coba inisialisasi
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                    log('✅ Firebase berhasil diinisialisasi!', 'success');
                } else {
                    log('⚠️ Firebase sudah diinisialisasi sebelumnya');
                }
                
                const app = firebase.app();
                log('📦 App name: ' + app.name, 'success');
                log('🔑 Project ID: ' + app.options.projectId, 'success');
                
            } catch(e) {
                log('❌ ERROR: ' + e.message, 'error');
                log('Stack: ' + e.stack, 'error');
            }
        }

        function test2() {
            log('🔐 TEST 2: Cek Auth Service');
            
            try {
                const auth = firebase.auth();
                log('✅ Auth service didapatkan', 'success');
                log('📝 Auth object type: ' + typeof auth);
                
                // Cek current user
                const user = auth.currentUser;
                if (user) {
                    log('👤 Ada user login: ' + user.email, 'success');
                } else {
                    log('👤 Belum ada user login', 'info');
                }
                
                // Cek apakah Google provider bisa dibuat
                const provider = new firebase.auth.GoogleAuthProvider();
                log('✅ Google provider berhasil dibuat', 'success');
                log('🔑 Provider ID: ' + provider.providerId);
                
            } catch(e) {
                log('❌ ERROR: ' + e.message, 'error');
            }
        }

        function test3() {
            log('🚀 TEST 3: Coba Login Google');
            
            try {
                const auth = firebase.auth();
                const provider = new firebase.auth.GoogleAuthProvider();
                
                log('Membuka popup login...');
                
                auth.signInWithPopup(provider)
                    .then(function(result) {
                        log('✅✅✅ LOGIN BERHASIL! ✅✅✅', 'success');
                        log('👤 Nama: ' + result.user.displayName, 'success');
                        log('📧 Email: ' + result.user.email, 'success');
                        log('🆔 UID: ' + result.user.uid, 'success');
                    })
                    .catch(function(error) {
                        log('❌ LOGIN GAGAL', 'error');
                        log('Error code: ' + error.code, 'error');
                        log('Error message: ' + error.message, 'error');
                        
                        // Analisa error
                        switch(error.code) {
                            case 'auth/configuration-not-found':
                                log('🔧 SOLUSI: Google Sign-In BELUM diaktifkan!', 'error');
                                log('Langkah:', 'error');
                                log('1. Buka https://console.firebase.google.com', 'error');
                                log('2. Pilih project: wa-clone-rafly', 'error');
                                log('3. Klik Authentication (menu kiri)', 'error');
                                log('4. Klik tab Sign-in method', 'error');
                                log('5. Cari Google, klik, lalu ENABLE', 'error');
                                log('6. SAVE', 'error');
                                break;
                            case 'auth/popup-blocked':
                                log('🔧 SOLUSI: Popup diblokir browser', 'error');
                                log('Klik icon 🔒 di address bar > Izinkan popup', 'error');
                                break;
                            case 'auth/popup-closed-by-user':
                                log('🔧 User menutup popup, coba lagi', 'error');
                                break;
                            default:
                                log('🔧 Error tidak dikenal: ' + error.code, 'error');
                        }
                    });
                    
            } catch(e) {
                log('❌ ERROR: ' + e.message, 'error');
            }
        }

        // Auto-test saat halaman dibuka
        window.onload = function() {
            log('🚀 Halaman test dimuat');
            log('🌐 URL: ' + window.location.href);
            log('📶 Online: ' + navigator.onLine);
            log('');
            log('👆 Klik tombol Test 1, 2, 3 secara berurutan');
        };
    </script>
</body>
</html>
