<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - RaflyChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .login-box h2 {
            margin-bottom: 8px;
            color: #111b21;
        }
        .login-box p {
            color: #667781;
            margin-bottom: 24px;
        }
        .google-btn {
            width: 100%;
            padding: 14px 20px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            transition: 0.3s;
        }
        .google-btn:hover {
            background: #3367d6;
            box-shadow: 0 2px 10px rgba(66,133,244,0.3);
        }
        .google-btn:active {
            transform: scale(0.98);
        }
        .google-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        .error-msg {
            color: #ef5350;
            margin-top: 16px;
            font-size: 14px;
            display: none;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
        }
        .success-msg {
            color: #4caf50;
            margin-top: 16px;
            font-size: 14px;
            display: none;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
        }
        .user-info {
            margin-top: 16px;
            display: none;
        }
        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 8px;
        }
        .logout-btn {
            margin-top: 16px;
            padding: 10px 20px;
            background: #ef5350;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #d32f2f;
        }
        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #667781;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔐 RaflyChat</h2>
        <p>Test Login dengan Google</p>
        
        <!-- Tombol Login -->
        <button id="loginBtn" class="google-btn">
            🚀 Masuk dengan Google
        </button>
        
        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>
        
        <!-- Success Message -->
        <div id="successMsg" class="success-msg"></div>
        
        <!-- User Info (muncul setelah login) -->
        <div id="userInfo" class="user-info">
            <img id="userPhoto" src="" alt="Profile">
            <h3 id="userName"></h3>
            <p id="userEmail"></p>
            <p id="userStatus" class="status"></p>
            <button id="logoutBtn" class="logout-btn">Keluar</button>
        </div>
    </div>

    <!-- Load Firebase dari CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDl9TVQ9B6G-PY6PtQJjyPkrqDMqeMhkrE",
            authDomain: "wa-clone-rafly.firebaseapp.com",
            projectId: "wa-clone-rafly",
            storageBucket: "wa-clone-rafly.firebasestorage.app",
            messagingSenderId: "217952329083",
            appId: "1:217952329083:web:644aafe82e9b40794b31de"
        };

        console.log('🔥 Inisialisasi Firebase...');
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        console.log('✅ Firebase siap!');

        // ==========================================
        // DOM ELEMENTS
        // ==========================================
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const userInfo = document.getElementById('userInfo');
        const userPhoto = document.getElementById('userPhoto');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userStatus = document.getElementById('userStatus');

        // ==========================================
        // CEK STATUS LOGIN
        // ==========================================
        auth.onAuthStateChanged(function(user) {
            console.log('👤 Auth state changed:', user ? user.email : 'Tidak login');
            
            if (user) {
                // User sudah login
                loginBtn.style.display = 'none';
                errorMsg.style.display = 'none';
                userInfo.style.display = 'block';
                successMsg.style.display = 'block';
                successMsg.textContent = '✅ Login berhasil!';
                
                userName.textContent = user.displayName || 'Tanpa Nama';
                userEmail.textContent = user.email || '';
                userPhoto.src = user.photoURL || '';
                userStatus.textContent = 'Status: Online';
                
                console.log('✅ User:', user.displayName, user.email);
            } else {
                // User belum login
                loginBtn.style.display = 'flex';
                userInfo.style.display = 'none';
                successMsg.style.display = 'none';
                console.log('ℹ️ Silakan login');
            }
        }, function(error) {
            console.error('❌ Auth error:', error);
            errorMsg.textContent = 'Error: ' + error.message;
            errorMsg.style.display = 'block';
        });

        // ==========================================
        // TOMBOL LOGIN
        // ==========================================
        loginBtn.addEventListener('click', function() {
            console.log('🖱️ Tombol login DIKLIK!');
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Menghubungkan...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Coba login
            auth.signInWithPopup(provider)
                .then(function(result) {
                    console.log('✅ Login SUKSES:', result.user.email);
                })
                .catch(function(error) {
                    console.error('❌ Login GAGAL:', error.code, error.message);
                    
                    let pesan = '';
                    
                    switch(error.code) {
                        case 'auth/popup-closed-by-user':
                            pesan = '❌ Popup ditutup sebelum login selesai. Coba lagi.';
                            break;
                        case 'auth/popup-blocked':
                            pesan = '🚫 Popup diblokir browser! <br><br>Cara memperbaiki:<br>1. Klik icon 🔒 di address bar<br>2. Izinkan popup untuk situs ini<br>3. Refresh halaman';
                            break;
                        case 'auth/cancelled-popup-request':
                            pesan = '⚠️ Login dibatalkan. Coba lagi.';
                            break;
                        case 'auth/network-request-failed':
                            pesan = '📡 Gagal koneksi. Cek internet Anda.';
                            break;
                        case 'auth/configuration-not-found':
                            pesan = '⚙️ Google Sign-In belum diaktifkan di Firebase Console.<br><br>Cara: Firebase Console → Authentication → Sign-in method → Aktifkan Google';
                            break;
                        default:
                            pesan = '❌ Error: ' + error.message;
                    }
                    
                    errorMsg.innerHTML = pesan;
                    errorMsg.style.display = 'block';
                })
                .finally(function() {
                    // Enable button kembali
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '🚀 Masuk dengan Google';
                });
        });

        // ==========================================
        // TOMBOL LOGOUT
        // ==========================================
        logoutBtn.addEventListener('click', function() {
            auth.signOut()
                .then(function() {
                    console.log('👋 Logout berhasil');
                })
                .catch(function(error) {
                    console.error('Logout error:', error);
                });
        });

        // ==========================================
        // CEK KONEKSI
        // ==========================================
        window.addEventListener('online', function() {
            console.log('📶 Online');
            userStatus.textContent = 'Status: Online';
            userStatus.style.color = '#4caf50';
        });
        
        window.addEventListener('offline', function() {
            console.log('📵 Offline');
            userStatus.textContent = 'Status: Offline';
            userStatus.style.color = '#ef5350';
        });

        console.log('✅ Semua siap! Klik tombol "Masuk dengan Google" untuk test');
        console.log('📋 Jika tombol tidak berfungsi, cek Console (F12) untuk error');
    </script>

</body>
  </html>
