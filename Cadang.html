<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaflyChat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- LOGIN MODAL -->
    <div id="loginModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <i class="fas fa-comment-dots" style="font-size: 64px; color: #00a884; margin-bottom: 16px;"></i>
            <h2 style="margin-bottom: 8px; font-size: 24px;">RaflyChat</h2>
            <p style="color: #667781; margin-bottom: 32px;">Chat dengan mudah dan aman</p>
            
            <button id="googleLoginBtn" style="width: 100%; padding: 14px; border: 2px solid #e0e0e0; background: #f5f5f5; border-radius: 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: inherit; transition: all 0.3s;">
                <img src="https://www.google.com/favicon.ico" alt="Google" style="width: 20px; height: 20px;">
                Masuk dengan Google
            </button>
            
            <p style="margin-top: 24px; font-size: 13px; color: #667781;">🔒 Login aman dengan Google</p>
            <p id="loginError" style="color: #ef5350; margin-top: 12px; font-size: 13px; display: none;"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" style="display: none; height: 100vh; width: 100vw;">
        <div style="display: flex; align-items: center; justify-content: center; height: 100%; background: #f0f2f5;">
            <div style="text-align: center;">
                <h2 id="welcomeUser" style="font-size: 24px; margin-bottom: 16px;"></h2>
                <p style="color: #667781; margin-bottom: 24px;">Login berhasil!</p>
                <button id="logoutBtn" style="padding: 12px 24px; background: #ef5350; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDl9TVQ9B6G-PY6PtQJjyPkrqDMqeMhkrE",
            authDomain: "wa-clone-rafly.firebaseapp.com",
            projectId: "wa-clone-rafly",
            storageBucket: "wa-clone-rafly.firebasestorage.app",
            messagingSenderId: "217952329083",
            appId: "1:217952329083:web:644aafe82e9b40794b31de"
        };

        console.log('🔥 Inisialisasi Firebase...');
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        
        console.log('✅ Firebase siap');

        // Get elements
        const loginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginModal = document.getElementById('loginModal');
        const appDiv = document.getElementById('app');
        const loginError = document.getElementById('loginError');
        const welcomeUser = document.getElementById('welcomeUser');

        // Cek status login
        onAuthStateChanged(auth, (user) => {
            console.log('Auth state changed:', user ? user.email : 'Belum login');
            
            if (user) {
                // User login
                loginModal.style.display = 'none';
                appDiv.style.display = 'block';
                welcomeUser.textContent = `Selamat datang, ${user.displayName || 'Pengguna'}!`;
            } else {
                // User logout
                loginModal.style.display = 'flex';
                appDiv.style.display = 'none';
            }
        }, (error) => {
            console.error('Auth error:', error);
            loginError.textContent = 'Gagal cek status login: ' + error.message;
            loginError.style.display = 'block';
        });

        // Tombol Google Login
        loginBtn.addEventListener('click', async () => {
            console.log('🖱️ Tombol login diklik');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menghubungkan...';
            loginError.style.display = 'none';

            try {
                console.log('🔑 Membuka popup Google login...');
                const result = await signInWithPopup(auth, provider);
                console.log('✅ Login berhasil:', result.user.email);
            } catch (error) {
                console.error('❌ Login gagal:', error.code, error.message);
                
                let msg = 'Gagal login. ';
                if (error.code === 'auth/popup-closed-by-user') {
                    msg = 'Login dibatalkan. Silakan coba lagi.';
                } else if (error.code === 'auth/popup-blocked') {
                    msg = 'Popup diblokir browser! Izinkan popup untuk situs ini.';
                } else if (error.code === 'auth/configuration-not-found') {
                    msg = 'Login Google belum diaktifkan di Firebase Console.';
                } else if (error.code === 'auth/cancelled-popup-request') {
                    msg = 'Login dibatalkan.';
                } else {
                    msg += error.message;
                }
                
                loginError.textContent = msg;
                loginError.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<img src="https://www.google.com/favicon.ico" alt="Google" style="width: 20px; height: 20px;"> Masuk dengan Google';
            }
        });

        // Tombol logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                console.log('👋 Logout berhasil');
            } catch (error) {
                console.error('Logout error:', error);
            }
        });

        console.log('📋 Semua listener terpasang');
    </script>

</body>
              </html>
