<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaflyChat - WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" style="display: flex; position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: var(--shadow-lg);">
            <i class="fas fa-comment-dots" style="font-size: 64px; color: #00a884; margin-bottom: 16px;"></i>
            <h2 style="margin-bottom: 8px; color: var(--text-primary);">RaflyChat</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">Chat dengan mudah dan aman</p>
            
            <button id="googleLoginBtn" style="width: 100%; padding: 14px; border: 2px solid var(--border-color); background: var(--bg-input); color: var(--text-primary); border-radius: 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: inherit; transition: all 0.3s;">
                <img src="https://www.google.com/favicon.ico" alt="G" style="width: 20px; height: 20px;">
                Masuk dengan Google
            </button>
            
            <p id="loginError" style="color: #ef5350; margin-top: 16px; font-size: 13px; display: none;"></p>
            <p style="margin-top: 20px; font-size: 12px; color: var(--text-secondary);">🔒 Login aman dengan Google</p>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="mainApp" style="display: none; height: 100vh; width: 100vw; flex-direction: column;">
        
        <!-- Header -->
        <header style="background: var(--bg-secondary); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="headerAvatar" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                <div>
                    <h3 id="headerName" style="font-size: 15px; font-weight: 600; color: var(--text-primary);">Pengguna</h3>
                    <span id="headerStatus" style="font-size: 12px; color: #4caf50;">Online</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="copyLinkBtn" title="Salin Link Chat Saya" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: var(--accent-color); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-link"></i>
                </button>
                <button id="themeToggle" title="Dark/Light Mode" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: var(--text-secondary); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="logoutBtnMain" title="Keluar" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: #ef5350; border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div style="flex: 1; display: flex; overflow: hidden;">
            
            <!-- Sidebar -->
            <aside id="sidebar" style="width: 350px; min-width: 350px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden;">
                
                <!-- Search -->
                <div style="padding: 12px;">
                    <div style="background: var(--bg-input); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-search" style="color: var(--text-secondary); font-size: 14px;"></i>
                        <input type="text" id="searchInput" placeholder="Cari atau mulai chat baru" style="border: none; background: transparent; outline: none; font-size: 14px; color: var(--text-primary); width: 100%; font-family: inherit;">
                    </div>
                </div>

                <!-- Tabs -->
                <div style="display: flex; border-bottom: 1px solid var(--border-color);">
                    <button class="tab-btn active" data-tab="chats" style="flex: 1; padding: 12px; border: none; background: transparent; color: var(--accent-color); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid var(--accent-color); font-family: inherit;">
                        <i class="fas fa-comment"></i> Chat
                    </button>
                    <button class="tab-btn" data-tab="groups" style="flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit;">
                        <i class="fas fa-users"></i> Grup
                    </button>
                </div>

                <!-- Chat/Grup List -->
                <div id="chatListContainer" style="flex: 1; overflow-y: auto;">
                    <div id="chatList" style="min-height: 100%;">
                        <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
                            <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                            <p>Belum ada percakapan</p>
                            <p style="font-size: 12px; margin-top: 8px;">Link chat kamu: <code id="myLinkDisplay" style="background: var(--bg-input); padding: 4px 8px; border-radius: 4px; font-size: 11px; word-break: break-all;"></code></p>
                        </div>
                    </div>
                    <div id="groupList" style="display: none; min-height: 100%;">
                        <div style="padding: 20px; text-align: center;">
                            <button id="createGroupBtn" style="padding: 12px 24px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;">
                                <i class="fas fa-plus"></i> Buat Grup Baru
                            </button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main style="flex: 1; display: flex; flex-direction: column; background: var(--bg-chat);">
                
                <!-- Blank State -->
                <div id="blankChat" style="flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary);">
                    <div style="text-align: center;">
                        <i class="fas fa-comments" style="font-size: 80px; color: var(--accent-color); margin-bottom: 20px; opacity: 0.8;"></i>
                        <h2 style="color: var(--text-primary); margin-bottom: 8px;">RaflyChat</h2>
                        <p style="color: var(--text-secondary);">Pilih percakapan atau buka link untuk mulai chat</p>
                    </div>
                </div>

                <!-- Active Chat -->
                <div id="activeChat" style="display: none; flex: 1; flex-direction: column; height: 100%;">
                    
                    <!-- Chat Header -->
                    <div style="padding: 10px 16px; background: var(--bg-secondary); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color);">
                        <img id="chatPartnerAvatar" src="" alt="" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;">
                        <div style="flex: 1;">
                            <h4 id="chatPartnerName" style="font-size: 15px; font-weight: 600; color: var(--text-primary);">Nama</h4>
                            <span id="chatPartnerStatus" style="font-size: 11px; color: var(--text-secondary);">Offline</span>
                        </div>
                        <button id="closeChatBtn" style="width: 36px; height: 36px; border: none; background: transparent; color: var(--text-secondary); border-radius: 50%; cursor: pointer; font-size: 18px;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <!-- Messages -->
                    <div id="messagesContainer" style="flex: 1; overflow-y: auto; padding: 20px;">
                        <div id="messagesList" style="display: flex; flex-direction: column; gap: 4px;"></div>
                    </div>

                    <!-- Input -->
                    <div style="padding: 12px 16px; background: var(--bg-secondary); display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid var(--border-color);">
                        <div style="flex: 1; background: var(--bg-input); border-radius: 24px; padding: 8px 16px;">
                            <textarea id="messageInput" placeholder="Ketik pesan..." rows="1" style="width: 100%; border: none; background: transparent; outline: none; resize: none; font-size: 14px; color: var(--text-primary); font-family: inherit; max-height: 120px;"></textarea>
                        </div>
                        <button id="sendBtn" style="width: 44px; height: 44px; border: none; background: var(--accent-color); color: white; border-radius: 50%; cursor: pointer; font-size: 18px; transition: all 0.3s;">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--bg-secondary); border-radius: 16px; padding: 24px; max-width: 400px; width: 90%;">
            <h3 style="margin-bottom: 16px; color: var(--text-primary);">Buat Grup Baru</h3>
            <input type="text" id="groupNameInput" placeholder="Nama grup" maxlength="100" style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; margin-bottom: 12px; font-size: 14px; background: var(--bg-input); color: var(--text-primary); font-family: inherit;">
            <p id="groupError" style="color: #ef5350; font-size: 12px; margin-bottom: 12px; display: none;"></p>
            <div style="display: flex; gap: 8px;">
                <button onclick="document.getElementById('createGroupModal').style.display='none'" style="flex: 1; padding: 12px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); border-radius: 8px; cursor: pointer; font-family: inherit;">Batal</button>
                <button id="submitGroupBtn" style="flex: 1; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit;">Buat</button>
            </div>
        </div>
    </div>

    <!-- Notifications Container -->
    <div id="notifications" style="position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 8px;"></div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Aplikasi Utama -->
    <script src="src/database/firebase-config.js"></script>
    <script src="src/utils/storage-local.js"></script>
    <script src="src/utils/notification.js"></script>
    <script src="src/utils/user-link.js"></script>
    <script src="src/utils/ai-assistant.js"></script>
    <script src="src/auth/login.js"></script>
    <script src="src/chat/group.js"></script>
    <script src="src/chat/send.js"></script>
    <script src="src/chat/render.js"></script>
    <script src="src/status/status-handler.js"></script>
    <script src="src/main.js"></script>

</body>
  </html>
