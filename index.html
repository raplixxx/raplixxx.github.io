<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaflyChat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">💬</div>
            <h2 class="login-title">RaflyChat</h2>
            <p class="login-subtitle">Chat aman dengan Google & Microsoft</p>
            
            <button id="googleLoginBtn" class="login-btn google">
                <img src="https://www.google.com/favicon.ico" alt="G"> Masuk dengan Google
            </button>
            <button id="microsoftLoginBtn" class="login-btn microsoft">
                <i class="fab fa-microsoft"></i> Masuk dengan Microsoft
            </button>
            
            <p id="loginError" style="color:#ef5350;margin-top:16px;font-size:13px;display:none;"></p>
            <p style="margin-top:20px;font-size:11px;color:var(--text-tertiary);">🔒 Login aman • Session diingat</p>
        </div>
    </div>

    <!-- USERNAME SETUP -->
    <div id="usernameSetup" class="username-setup">
        <div class="username-setup-card">
            <div class="username-setup-icon">👤</div>
            <h3 style="margin-bottom:8px;">Buat Username</h3>
            <p style="color:var(--text-secondary);margin-bottom:20px;">Username ini untuk link chat kamu</p>
            <div class="username-input-group">
                <span class="username-prefix">@</span>
                <input type="text" id="usernameInput" class="username-input" placeholder="nama_kamu" maxlength="30" autocomplete="off">
            </div>
            <p class="username-hint">Gunakan huruf, angka, dan underscore (_)</p>
            <p id="usernameAvailability" class="username-availability"></p>
            <p id="usernameError" class="username-error"></p>
            <button id="saveUsernameBtn" class="btn btn-primary btn-block btn-lg" disabled>
                <i class="fas fa-check"></i> Simpan Username
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="app-container" style="display:none;">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile-mini">
                    <img id="headerAvatar" src="" alt="" class="avatar">
                    <div class="user-info-mini">
                        <h3 id="headerName">User</h3>
                        <span id="headerStatus">Online</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="aiPanelBtn" class="icon-btn" title="AI Assistant"><i class="fas fa-robot"></i></button>
                    <button id="copyLinkBtn" class="icon-btn" title="Salin Link"><i class="fas fa-link"></i></button>
                    <button id="themeToggle" class="icon-btn" title="Tema"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtnMain" class="icon-btn" title="Keluar"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari username untuk chat...">
                </div>
            </div>

            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="chats"><i class="fas fa-comment"></i> Chat</button>
                <button class="tab-btn" data-tab="groups"><i class="fas fa-users"></i> Grup</button>
                <button class="tab-btn" data-tab="status"><i class="fas fa-circle"></i> Status</button>
            </div>

            <div class="sidebar-content">
                <div id="chatList" class="chat-list"></div>
                <div id="groupList" class="chat-list" style="display:none;"></div>
                <div id="statusTabContent" style="display:none;flex-direction:column;height:100%;">
                    <div style="padding:12px;border-bottom:1px solid var(--border);">
                        <button onclick="showStatusUploadModal()" class="btn btn-primary btn-block"><i class="fas fa-plus-circle"></i> Buat Status</button>
                    </div>
                    <div id="statusListContainer" style="flex:1;overflow-y:auto;"></div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div id="blankChat" class="welcome-screen">
                <div class="welcome-content">
                    <i class="fas fa-comments welcome-icon"></i>
                    <h2>RaflyChat</h2>
                    <p>Pilih chat atau cari username untuk mulai</p>
                    <div style="margin-top:20px;">
                        <input type="text" id="inviteLinkInput" placeholder="Tempel kode undangan grup..." class="form-input" style="margin-bottom:8px;">
                        <button id="joinGroupBtn" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Gabung Grup</button>
                    </div>
                </div>
            </div>

            <div id="activeChat" class="chat-area" style="display:none;">
                <div class="chat-header">
                    <button id="backToSidebarBtn" class="icon-btn" style="display:none;"><i class="fas fa-arrow-left"></i></button>
                    <img id="chatPartnerAvatar" src="" alt="" class="avatar-sm">
                    <div class="chat-header-info">
                        <h3 id="chatPartnerName">Nama</h3>
                        <span id="chatPartnerStatus">Offline</span>
                    </div>
                    <div class="chat-header-actions">
                        <button id="voiceCallBtn" class="icon-btn" title="Panggilan Suara"><i class="fas fa-phone"></i></button>
                        <button id="videoCallBtn" class="icon-btn" title="Panggilan Video"><i class="fas fa-video"></i></button>
                        <button id="groupInfoBtn" class="icon-btn" title="Info Grup" style="display:none;"><i class="fas fa-info-circle"></i></button>
                        <button id="closeChatBtn" class="icon-btn" title="Tutup"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <div id="messagesContainer" class="messages-container">
                    <div id="messagesList" class="messages-list"></div>
                </div>

                <div id="replyPreview" class="reply-preview-bar" style="display:none;">
                    <div class="reply-preview-content">
                        <span class="reply-preview-label">↩ Membalas:</span>
                        <span id="replyText" class="reply-preview-text"></span>
                    </div>
                    <button class="icon-btn small" onclick="cancelReply()"><i class="fas fa-times"></i></button>
                </div>

                <div class="message-input-area">
                    <button id="emojiBtn" class="icon-btn" title="Emoji"><i class="fas fa-smile"></i></button>
                    <button id="attachBtn" class="icon-btn" title="Kirim Gambar"><i class="fas fa-paperclip"></i></button>
                    <div class="input-wrapper">
                        <textarea id="messageInput" class="message-input" placeholder="Ketik pesan..." rows="1"></textarea>
                    </div>
                    <button id="voiceNoteBtn" class="icon-btn" title="Voice Note"><i class="fas fa-microphone"></i></button>
                    <button id="sendBtn" class="send-btn" title="Kirim"><i class="fas fa-paper-plane"></i></button>
                </div>

                <div id="emojiPicker" class="emoji-picker-container" style="display:none;">
                    <div class="emoji-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- CREATE GROUP MODAL -->
    <div id="createGroupModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>📁 Buat Grup Baru</h3>
                <button class="icon-btn" onclick="this.closest('.modal-overlay').style.display='none'"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Nama Grup</label>
                    <input type="text" id="groupNameInput" class="form-input" placeholder="Nama grup..." maxlength="100">
                </div>
                <div class="form-group">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="groupDescInput" class="form-textarea" rows="2" placeholder="Deskripsi singkat..." maxlength="500"></textarea>
                </div>
                <p id="groupError" class="form-error"></p>
                <button id="submitGroupBtn" class="btn btn-primary btn-block"><i class="fas fa-check"></i> Buat Grup</button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="notifications" class="notifications-container"></div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- APP SCRIPTS -->
    <script src="src/database/firebase-config.js"></script>
    <script src="src/utils/storage-local.js"></script>
    <script src="src/utils/notification.js"></script>
    <script src="src/utils/user-link.js"></script>
    <script src="src/utils/ai-assistant.js"></script>
    <script src="src/auth/login.js"></script>
    <script src="src/chat/group.js"></script>
    <script src="src/chat/send.js"></script>
    <script src="src/chat/call.js"></script>
    <script src="src/profile/settings.js"></script>
    <script src="src/status/status-handler.js"></script>
    <script src="src/main.js"></script>
</body>
  </html>
