<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaflyChat - WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" style="display: flex; position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: var(--shadow-lg);">
            <i class="fas fa-comment-dots" style="font-size: 64px; color: #00a884; margin-bottom: 16px;"></i>
            <h2 style="margin-bottom: 8px; color: var(--text-primary);">RaflyChat</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">Chat dengan mudah dan aman</p>
            
            <button id="googleLoginBtn" style="width: 100%; padding: 14px; border: 2px solid var(--border-color); background: var(--bg-input); color: var(--text-primary); border-radius: 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: inherit; transition: all 0.3s;">
                <img src="https://www.google.com/favicon.ico" alt="G" style="width: 20px; height: 20px;">
                Masuk dengan Google
            </button>
            
            <p id="loginError" style="color: #ef5350; margin-top: 16px; font-size: 13px; display: none;"></p>
            <p style="margin-top: 20px; font-size: 12px; color: var(--text-secondary);">🔒 Login aman dengan Google</p>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="mainApp" style="display: none; height: 100vh; width: 100vw; flex-direction: column;">
        
        <!-- HEADER -->
        <header style="background: var(--bg-secondary); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); min-height: 60px;">
            <div style="display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;">
                <img id="headerAvatar" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--bg-input);">
                <div style="min-width: 0;">
                    <h3 id="headerName" style="font-size: 15px; font-weight: 600; color: var(--text-primary);">Pengguna</h3>
                    <span id="headerStatus" style="font-size: 12px; color: #4caf50;">Online</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px; flex-shrink: 0;">
                <button id="copyLinkBtn" title="Salin Link Chat Saya" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: var(--accent-color); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-link"></i>
                </button>
                <button id="themeToggle" title="Dark/Light Mode" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: var(--text-secondary); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="logoutBtnMain" title="Keluar" style="width: 40px; height: 40px; border: none; background: var(--bg-input); color: #ef5350; border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.3s;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <div style="flex: 1; display: flex; overflow: hidden;">
            
            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar">
                
                <!-- Search -->
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Cari atau mulai chat baru">
                    </div>
                </div>

                <!-- Tabs -->
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="chats">
                        <i class="fas fa-comment"></i> Chat
                    </button>
                    <button class="tab-btn" data-tab="groups">
                        <i class="fas fa-users"></i> Grup
                    </button>
                    <button class="tab-btn" data-tab="status">
                        <i class="fas fa-circle"></i> Status
                    </button>
                </div>

                <!-- Tab Content -->
                <div style="flex: 1; overflow: hidden;">
                    
                    <!-- Chat Tab -->
                    <div id="chatList" class="chat-list">
                        <div style="padding: 40px 20px; text-align: center; color: var(--text-secondary);">
                            <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                            <p style="margin-bottom: 16px;">Belum ada percakapan</p>
                            <p style="font-size: 12px; margin-bottom: 4px;">Link chat kamu:</p>
                            <code id="myLinkDisplay" style="background: var(--bg-input); padding: 8px 12px; border-radius: 8px; font-size: 11px; word-break: break-all; display: inline-block; max-width: 100%;"></code>
                        </div>
                    </div>

                    <!-- Group Tab -->
                    <div id="groupList" class="chat-list" style="display: none;">
                        <div style="padding: 16px;">
                            <button id="createGroupBtnSidebar" style="width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;">
                                <i class="fas fa-plus"></i> Buat Grup Baru
                            </button>
                        </div>
                    </div>

                    <!-- Status Tab -->
                    <div id="statusTabContent" style="display: none; height: 100%; flex-direction: column;">
                        <div style="padding: 16px; border-bottom: 1px solid var(--border-color);">
                            <button onclick="showStatusUploadModal()" style="width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;">
                                <i class="fas fa-plus-circle"></i> Buat Status Baru
                            </button>
                        </div>
                        <div id="statusListContainer" style="flex: 1; overflow-y: auto;"></div>
                    </div>
                </div>
            </aside>

            <!-- CHAT AREA -->
            <main class="main-content">
                
                <!-- Blank State -->
                <div id="blankChat" class="welcome-screen">
                    <div class="welcome-content">
                        <i class="fas fa-comments welcome-icon"></i>
                        <h2>Selamat Datang di RaflyChat</h2>
                        <p>Pilih percakapan, buat grup, atau bagikan link chat kamu untuk mulai chatting</p>
                        
                        <!-- Join via Invite Link -->
                        <div style="margin-top: 24px;">
                            <input type="text" id="inviteLinkInput" placeholder="Tempel link undangan grup di sini..." 
                                   style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-input); color: var(--text-primary); font-family: inherit; margin-bottom: 8px;">
                            <button id="joinGroupBtn" style="width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;">
                                <i class="fas fa-sign-in-alt"></i> Gabung Grup
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Active Chat -->
                <div id="activeChat" class="chat-area" style="display: none;">
                    
                    <!-- Chat Header -->
                    <div class="chat-header">
                        <button id="backToSidebarBtn" class="icon-btn back-btn" style="display: none;">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <div class="chat-header-info">
                            <img id="chatPartnerAvatar" src="" alt="" class="avatar small">
                            <div>
                                <h3 id="chatPartnerName">Nama</h3>
                                <span id="chatPartnerStatus" class="chat-status">Offline</span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 4px;">
                            <button id="groupInfoBtn" class="icon-btn" title="Info Grup" style="display: none;">
                                <i class="fas fa-info-circle"></i>
                            </button>
                            <button id="searchMsgBtn" class="icon-btn" title="Cari Pesan">
                                <i class="fas fa-search"></i>
                            </button>
                            <button id="closeChatBtn" class="icon-btn" title="Tutup Chat">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div id="messagesContainer" class="message-container">
                        <div id="messagesList" class="messages-list"></div>
                    </div>

                    <!-- Reply Preview -->
                    <div id="replyPreview" class="reply-preview" style="display: none;">
                        <div class="reply-content">
                            <span class="reply-label">↩ Membalas:</span>
                            <span id="replyText" class="reply-message"></span>
                        </div>
                        <button class="icon-btn small" onclick="cancelReply()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <!-- Message Input -->
                    <div class="message-input-container">
                        <button id="emojiBtn" class="icon-btn" title="Emoji">
                            <i class="fas fa-smile"></i>
                        </button>
                        <div class="input-wrapper">
                            <textarea id="messageInput" class="message-input" placeholder="Ketik pesan..." rows="1"></textarea>
                        </div>
                        <button id="voiceNoteBtn" class="icon-btn" title="Voice Note">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button id="sendBtn" class="send-btn" title="Kirim">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>

                    <!-- Emoji Picker -->
                    <div id="emojiPicker" class="emoji-picker" style="display: none;">
                        <div class="emoji-grid"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- ==================== CREATE GROUP MODAL ==================== -->
    <div id="createGroupModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--bg-modal); border-radius: 16px; padding: 24px; max-width: 450px; width: 90%; box-shadow: var(--shadow-lg);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: var(--text-primary); font-size: 18px;">📁 Buat Grup Baru</h3>
                <button onclick="document.getElementById('createGroupModal').style.display='none'" style="width: 36px; height: 36px; border: none; background: transparent; color: var(--text-secondary); border-radius: 50%; cursor: pointer; font-size: 18px;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="form-group">
                <label for="groupNameInput">Nama Grup *</label>
                <input type="text" id="groupNameInput" placeholder="Contoh: Geng Motor, Keluarga, Tim Proyek..." maxlength="100" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="groupDescInput">Deskripsi (Opsional)</label>
                <textarea id="groupDescInput" placeholder="Deskripsi singkat grup..." rows="2" maxlength="500"></textarea>
            </div>
            
            <p id="groupError" class="error-message" style="display: none;"></p>
            
            <div style="display: flex; gap: 8px;">
                <button onclick="document.getElementById('createGroupModal').style.display='none'" style="flex: 1; padding: 12px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px;">
                    Batal
                </button>
                <button id="submitGroupBtn" style="flex: 1; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;">
                    <i class="fas fa-check"></i> Buat Grup
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== GROUP INFO MODAL ==================== -->
    <div id="groupInfoModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--bg-modal); border-radius: 16px; padding: 24px; max-width: 450px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg);">
            <div id="groupInfoContent"></div>
        </div>
    </div>

    <!-- ==================== NOTIFICATIONS ==================== -->
    <div id="notifications" class="notifications-container"></div>

    <!-- ==================== FIREBASE SDK ==================== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <!-- ==================== APPLICATION SCRIPTS ==================== -->
    <script src="src/database/firebase-config.js"></script>
    <script src="src/utils/storage-local.js"></script>
    <script src="src/utils/notification.js"></script>
    <script src="src/utils/user-link.js"></script>
    <script src="src/utils/ai-assistant.js"></script>
    <script src="src/auth/login.js"></script>
    <script src="src/chat/group.js"></script>
    <script src="src/chat/render.js"></script>
    <script src="src/chat/send.js"></script>
    <script src="src/status/status-handler.js"></script>
    <script src="src/main.js"></script>

</body>
  </html>
