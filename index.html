<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaflyChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#00a884;--pd:#008f72;--pb:rgba(0,168,132,0.08);--pg:linear-gradient(135deg,#667eea,#764ba2);--r:#ef5350;--g:#4caf50;--bg:#efeae2;--bs:#fff;--bc:#e5ddd5;--bi:#f0f2f5;--bh:#f5f6f6;--tp:#111b21;--ts:#667781;--tt:#8696a0;--br:#e9edef;--sh:0 2px 8px rgba(0,0,0,0.12);--rad:12px;--tr:0.25s ease}
        [data-theme="dark"]{--bg:#0b141a;--bs:#1f2c33;--bc:#0b141a;--bi:#2a3942;--bh:#202c33;--tp:#e9edef;--ts:#8696a0;--tt:#667781;--br:#313d45}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;font-size:14px;color:var(--tp);background:var(--bg);overflow:hidden;height:100vh;width:100vw;-webkit-font-smoothing:antialiased}
        button{cursor:pointer;border:none;background:none;font-family:inherit}
        input,textarea{font-family:inherit;font-size:14px;color:var(--tp);border:none;outline:none;background:transparent}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes messageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* LOGIN */
        .login-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)}
        .login-card{background:var(--bs);border-radius:24px;padding:48px 40px;text-align:center;max-width:440px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,0.3);animation:slideUp .6s ease}
        .login-logo{width:80px;height:80px;background:linear-gradient(135deg,#00a884,#25d366);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:40px;color:white}
        .login-title{font-size:24px;font-weight:700;margin-bottom:8px;color:var(--tp)}
        .login-subtitle{color:var(--ts);font-size:14px;margin-bottom:32px}
        .login-btn{width:100%;padding:14px 20px;border:2px solid #4285f4;background:var(--bs);color:var(--tp);border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .25s;margin-bottom:12px}
        .login-btn:hover{background:#f8fbff;border-color:#3367d6;transform:translateY(-2px)}
        .login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .login-btn img{width:20px;height:20px}
        .login-error{color:#ef5350;margin-top:16px;font-size:12px;display:none;padding:10px;background:#ffcdd2;border-radius:8px}
        .login-status{color:var(--ts);font-size:13px;margin-top:16px;display:none}

        /* APP */
        .app-container{display:none;height:100vh;width:100vw;animation:fadeIn .3s ease}
        .app-container.active{display:flex}
        .sidebar{width:400px;min-width:400px;background:var(--bs);border-right:1px solid var(--br);display:flex;flex-direction:column;height:100vh;z-index:10}
        .sidebar-header{padding:12px 16px;background:var(--bs);display:flex;align-items:center;justify-content:space-between;min-height:60px;border-bottom:1px solid var(--br)}
        .user-profile-mini{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer;padding:4px;border-radius:8px}
        .user-profile-mini:hover{background:var(--bh)}
        .avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bi);border:2px solid var(--br)}
        .avatar-sm{width:32px;height:32px}
        .user-info-mini h3{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-info-mini span{font-size:11px;color:var(--ts)}
        .header-actions{display:flex;gap:4px}
        .icon-btn{width:40px;height:40px;border:none;background:transparent;color:var(--ts);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:18px}
        .icon-btn:hover{background:var(--bh);color:var(--tp)}
        .search-container{padding:8px 12px;background:var(--bs);border-bottom:1px solid var(--br)}
        .search-box{background:var(--bi);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:12px}
        .search-box i{color:var(--tt);font-size:14px}
        .search-box input{width:100%}
        .sidebar-tabs{display:flex;background:var(--bs);border-bottom:1px solid var(--br)}
        .tab-btn{flex:1;padding:14px 12px;border:none;background:transparent;color:var(--ts);font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:8px}
        .tab-btn.active{color:var(--p);border-bottom-color:var(--p);font-weight:600}
        .tab-btn:hover{background:var(--bh)}
        .sidebar-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .chat-list{flex:1;overflow-y:auto}
        .chat-item{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;border-bottom:1px solid var(--br)}
        .chat-item:hover{background:var(--bh)}
        .chat-avatar-placeholder{width:52px;height:52px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:20px;flex-shrink:0}
        .chat-content{flex:1;min-width:0}
        .chat-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-preview{font-size:13px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-badge{background:var(--p);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;min-width:22px;text-align:center}

        .main-content{flex:1;display:flex;flex-direction:column;background:var(--bc);position:relative;overflow:hidden}
        .welcome-screen{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bs)}
        .welcome-content{text-align:center;max-width:500px;padding:40px}
        .welcome-icon{font-size:80px;color:var(--p);margin-bottom:20px}
        .welcome-content h2{font-size:28px;font-weight:700;margin-bottom:12px;color:var(--tp)}
        .welcome-content p{color:var(--ts);font-size:16px;margin-bottom:20px}
        .link-box{background:var(--bi);border:2px dashed var(--p);border-radius:16px;padding:20px;margin-top:16px}
        .link-box-label{font-size:11px;color:var(--p);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .link-box-url{font-size:12px;color:var(--tp);word-break:break-all;font-family:monospace;background:var(--bs);padding:10px;border-radius:8px;margin:8px 0;border:1px solid var(--br)}
        .link-box-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--p);color:white;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;border:none}
        .link-box-btn:hover{background:var(--pd);transform:translateY(-2px)}

        .chat-area{flex:1;display:flex;flex-direction:column;height:100%}
        .chat-header{padding:10px 16px;background:var(--bs);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--br);min-height:60px}
        .chat-header-info{flex:1;display:flex;align-items:center;gap:12px;min-width:0}
        .chat-header-info h3{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-header-status{font-size:11px;color:var(--ts)}
        .messages-container{flex:1;overflow-y:auto;padding:20px;background-color:var(--bc);background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
        .messages-list{display:flex;flex-direction:column;gap:3px;padding-bottom:20px}
        .message-wrapper{display:flex;flex-direction:column;max-width:65%;animation:messageIn .3s ease}
        .message-wrapper.sent{align-self:flex-end}
        .message-wrapper.received{align-self:flex-start}
        .message-bubble{padding:8px 12px;border-radius:8px;word-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 2px rgba(0,0,0,0.05);max-width:100%}
        .message-wrapper.sent .message-bubble{background:#d9fdd3;border-bottom-right-radius:2px}
        .message-wrapper.received .message-bubble{background:var(--bs);border-bottom-left-radius:2px}
        [data-theme="dark"] .message-wrapper.sent .message-bubble{background:#005c4b}
        [data-theme="dark"] .message-wrapper.received .message-bubble{background:#202c33}
        .message-text{font-size:14px;color:var(--tp);line-height:1.45;word-break:break-word}
        .message-meta{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:2px}
        .message-time{font-size:11px;color:var(--tt)}

        .message-input-area{padding:10px 16px;background:var(--bs);display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--br)}
        .input-wrapper{flex:1;background:var(--bi);border-radius:24px;padding:10px 16px}
        .input-wrapper:focus-within{box-shadow:0 0 0 2px var(--p)}
        .message-input{width:100%;resize:none;max-height:120px}
        .send-btn{width:48px;height:48px;border:none;background:var(--p);color:white;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(0,168,132,0.3);transition:all .25s}
        .send-btn:hover{background:var(--pd);transform:scale(1.05)}
        .send-btn:disabled{opacity:0.5;transform:none}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(2px)}
        .modal{background:var(--bs);border-radius:16px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh);animation:slideUp .3s ease}
        .modal-header{padding:20px 24px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bs)}
        .modal-header h3{font-size:18px;font-weight:600}
        .modal-body{padding:24px}
        .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:var(--p);color:white}
        .btn-primary:hover{background:var(--pd)}
        .btn-block{width:100%;justify-content:center}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;text-transform:uppercase}
        .form-input{width:100%;padding:12px 16px;border:2px solid var(--br);border-radius:8px;font-size:14px;background:var(--bi);color:var(--tp);transition:all .25s}
        .form-input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(0,168,132,0.3)}

        .notifications-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;max-width:380px}
        .notification{padding:14px 20px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:var(--sh);animation:slideUp .3s ease;cursor:pointer;backdrop-filter:blur(10px)}
        .notification.success{background:rgba(76,175,80,.95);color:white}
        .notification.error{background:rgba(239,83,80,.95);color:white}
        .notification.info{background:rgba(33,150,243,.95);color:white}

        @media(max-width:768px){.sidebar{width:100%;min-width:100%;position:absolute}.sidebar.hidden{transform:translateX(-100%)}.message-wrapper{max-width:85%}}
        .hidden{display:none!important}
        .w-full{width:100%}
        .mt-4{margin-top:16px}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-logo">💬</div>
        <h2 class="login-title">RaflyChat</h2>
        <p class="login-subtitle">Chat dengan Google</p>
        <button id="googleLoginBtn" class="login-btn"><img src="https://www.google.com/favicon.ico" alt="G"> Masuk dengan Google</button>
        <p id="loginError" class="login-error"></p>
        <p id="loginStatus" class="login-status"></p>
    </div>
</div>

<!-- APP -->
<div id="mainApp" class="app-container">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="user-profile-mini" id="profileBtn">
                <img id="headerAvatar" src="" alt="" class="avatar">
                <div class="user-info-mini"><h3 id="headerName">User</h3><span id="headerStatus" style="color:#4caf50;">Online</span></div>
            </div>
            <div class="header-actions">
                <button id="copyLinkBtn" class="icon-btn" title="Salin Link Chat"><i class="fas fa-link"></i></button>
                <button id="themeToggle" class="icon-btn" title="Tema"><i class="fas fa-moon"></i></button>
                <button id="logoutBtnMain" class="icon-btn" title="Keluar"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="search-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Cari username atau tempel link..."></div></div>
        <div class="sidebar-tabs">
            <button class="tab-btn active" data-tab="chats"><i class="fas fa-comment"></i> Chat</button>
            <button class="tab-btn" data-tab="groups"><i class="fas fa-users"></i> Grup</button>
        </div>
        <div class="sidebar-content">
            <div id="chatList" class="chat-list"></div>
            <div id="groupList" class="chat-list" style="display:none;"></div>
        </div>
    </aside>
    <main class="main-content">
        <div id="blankChat" class="welcome-screen">
            <div class="welcome-content">
                <i class="fas fa-comments welcome-icon"></i>
                <h2>RaflyChat</h2>
                <p id="welcomeMsg">Pilih chat atau bagikan link kamu!</p>
                <div id="myLinkBox" class="link-box" style="display:none;">
                    <div class="link-box-label">🔗 LINK CHAT KAMU</div>
                    <div class="link-box-url" id="myLinkDisplay">-</div>
                    <button class="link-box-btn" onclick="copyMyLink()"><i class="fas fa-copy"></i> Salin Link</button>
                    <p style="font-size:11px;color:var(--tt);margin-top:8px;">Bagikan ke teman untuk langsung chat!</p>
                </div>
                <div style="margin-top:20px;"><input type="text" id="inviteLinkInput" placeholder="Tempel kode grup..." class="form-input" style="margin-bottom:8px;"><button id="joinGroupBtn" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Gabung Grup</button></div>
            </div>
        </div>
        <div id="activeChat" class="chat-area" style="display:none;">
            <div class="chat-header">
                <button id="backToSidebarBtn" class="icon-btn" style="display:none;"><i class="fas fa-arrow-left"></i></button>
                <img id="chatPartnerAvatar" src="" alt="" class="avatar-sm">
                <div class="chat-header-info"><h3 id="chatPartnerName">Nama</h3><span id="chatPartnerStatus">Offline</span></div>
                <div class="chat-header-actions">
                    <button id="groupInfoBtn" class="icon-btn" title="Info Grup" style="display:none;"><i class="fas fa-info-circle"></i></button>
                    <button id="closeChatBtn" class="icon-btn" title="Tutup"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="messagesContainer" class="messages-container"><div id="messagesList" class="messages-list"></div></div>
            <div class="message-input-area">
                <div class="input-wrapper"><textarea id="messageInput" class="message-input" placeholder="Ketik pesan... @bot untuk AI" rows="1"></textarea></div>
                <button id="sendBtn" class="send-btn" title="Kirim"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<!-- GROUP MODAL -->
<div id="createGroupModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header"><h3>📁 Buat Grup</h3><button class="icon-btn" onclick="document.getElementById('createGroupModal').style.display='none'"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Nama Grup</label><input type="text" id="groupNameInput" class="form-input" placeholder="Nama grup..."></div>
            <p id="groupError" style="color:#ef5350;font-size:12px;display:none;"></p>
            <button id="submitGroupBtn" class="btn btn-primary btn-block"><i class="fas fa-check"></i> Buat</button>
        </div>
    </div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="notifications-container"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE =====
const fc={apiKey:"AIzaSyDl9TVQ9B6G-PY6PtQJjyPkrqDMqeMhkrE",authDomain:"wa-clone-rafly.firebaseapp.com",projectId:"wa-clone-rafly",storageBucket:"wa-clone-rafly.firebasestorage.app",messagingSenderId:"217952329083",appId:"1:217952329083:web:644aafe82e9b40794b31de"};
firebase.initializeApp(fc);
const auth=firebase.auth();
const db=firebase.firestore();
db.settings({ignoreUndefinedProperties:true});
const googleProvider=new firebase.auth.GoogleAuthProvider();
googleProvider.setCustomParameters({prompt:'select_account'});
console.log('✅ Firebase ready');

// ===== GLOBAL =====
let currentUser=null,userData=null,activeChatId=null,activeChatPartner=null,activeChatType='private',messagesUnsubscribe=null,currentGroupId=null;
const MAX_MEMBERS=1000;
const AIC={url:'https://ai.sumopod.com/v1/chat/completions',key:'sk-f-cGux8U_fsibMTbLa1utw',model:'gpt-4o-mini'};

// ===== NOTIF =====
function showNotif(m,t='info'){const c=document.getElementById('notifications');if(!c)return;const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const e=document.createElement('div');e.className='notification '+t;e.innerHTML=(i[t]||'')+' '+m;e.onclick=()=>e.remove();c.appendChild(e);setTimeout(()=>{if(e.parentNode)e.remove();},4000);}

// ===== LINK UNIK =====
function generateCode(){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';let r='';for(let i=0;i<64;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function getUserLink(code){return window.location.origin+window.location.pathname+'?='+code;}
function getCodeFromURL(){const p=new URLSearchParams(window.location.search);return p.get('=')||p.get('u');}
async function findUserByCode(code){const s=await db.collection('userlinks').doc(code).get();return s.exists?s.data():null;}
async function findUserByUsername(u){const s=await db.collection('usernames').doc(u.toLowerCase()).get();return s.exists?s.data():null;}
async function isUsernameAvailable(u){if(!u||u.length<3||!/^[a-zA-Z0-9_]+$/.test(u))return false;const s=await db.collection('usernames').doc(u.toLowerCase()).get();return!s.exists;}
function copyMyLink(){if(!userData?.linkCode)return;const l=getUserLink(userData.linkCode);navigator.clipboard.writeText(l).then(()=>showNotif('✅ Link disalin!','success'));}

// ===== AI =====
function isAICommand(t){return t.trim().toLowerCase().startsWith('@bot');}
function extractQuestion(t){return t.replace(/^@bot\s*/i,'').trim();}
async function getAIResponse(q){if(!q)return'Halo! 😊';try{const r=await fetch(AIC.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AIC.key},body:JSON.stringify({model:AIC.model,messages:[{role:'user',content:q}],max_tokens:200,temperature:0.7})});const d=await r.json();return d.choices?.[0]?.message?.content?.trim()||'Maaf, AI sibuk 🙏';}catch{return'Maaf, AI sedang istirahat 🙏';}}

// ===== AUTH =====
document.getElementById('googleLoginBtn').onclick=async function(){
    const b=this;b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Menghubungkan...';
    document.getElementById('loginError').style.display='none';
    document.getElementById('loginStatus').style.display='block';
    document.getElementById('loginStatus').textContent='Membuka popup Google...';
    try{
        const result=await auth.signInWithPopup(googleProvider);
        console.log('✅ Login berhasil:',result.user.email);
    }catch(e){
        console.error('❌ Login gagal:',e);
        let m='Gagal login. ';
        if(e.code==='auth/popup-closed-by-user')m='Login dibatalkan.';
        else if(e.code==='auth/popup-blocked')m='Popup diblokir! Izinkan popup.';
        else if(e.code==='auth/configuration-not-found')m='Google Sign-In belum diaktifkan di Firebase.';
        else if(e.code==='auth/unauthorized-domain')m='Domain tidak terdaftar.';
        else m+=e.message;
        document.getElementById('loginError').textContent=m;
        document.getElementById('loginError').style.display='block';
        document.getElementById('loginStatus').style.display='none';
    }
    b.disabled=false;b.innerHTML='<img src="https://www.google.com/favicon.ico" alt="G"> Masuk dengan Google';
};

// Ini bagian PENTING - transisi setelah login
auth.onAuthStateChanged(async user=>{
    console.log('👤 Auth state:',user?user.email:'No user');
    document.getElementById('loginStatus').textContent=user?'Login berhasil! Memuat...':'';
    
    if(user){
        currentUser=user;
        try{
            const doc=await db.collection('users').doc(user.uid).get();
            if(!doc.exists){
                // User baru - buat dokumen + langsung generate username & link
                const uname='user_'+user.uid.substring(0,8);
                const linkCode=generateCode();
                await db.collection('users').doc(user.uid).set({
                    uid:user.uid,email:user.email,displayName:user.displayName||'',
                    photoURL:user.photoURL||'',username:uname,usernameLower:uname.toLowerCase(),
                    linkCode:linkCode,status:'online',
                    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
                    lastSeen:firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('usernames').doc(uname.toLowerCase()).set({uid:user.uid,username:uname});
                await db.collection('userlinks').doc(linkCode).set({uid:user.uid,username:uname});
                userData={uid:user.uid,username:uname,linkCode:linkCode,displayName:user.displayName,photoURL:user.photoURL};
            }else{
                userData=doc.data();
                if(!userData.username||!userData.linkCode){
                    const uname=userData.username||'user_'+user.uid.substring(0,8);
                    const linkCode=userData.linkCode||generateCode();
                    await db.collection('users').doc(user.uid).update({username:uname,usernameLower:uname.toLowerCase(),linkCode:linkCode});
                    await db.collection('usernames').doc(uname.toLowerCase()).set({uid:user.uid,username:uname});
                    await db.collection('userlinks').doc(linkCode).set({uid:user.uid,username:uname});
                    userData.username=uname;userData.linkCode=linkCode;
                }
            }
            
            // TAMPILKAN APP - INI YANG PENTING!
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('mainApp').classList.add('active');
            updateUI();
            loadChats();
            loadGroups();
            showNotif('✅ Selamat datang, @'+userData.username+'!','success');
            console.log('✅ App loaded for:',userData.username);
            
        }catch(e){
            console.error('❌ Error loading user:',e);
            document.getElementById('loginError').textContent='Gagal memuat data. Refresh halaman.';
            document.getElementById('loginError').style.display='block';
            document.getElementById('loginStatus').style.display='none';
        }
    }else{
        currentUser=null;userData=null;
        document.getElementById('loginScreen').style.display='flex';
        document.getElementById('mainApp').classList.remove('active');
        document.getElementById('loginStatus').style.display='none';
    }
});

function updateUI(){
    document.getElementById('headerName').textContent=userData?.username||'User';
    document.getElementById('headerAvatar').src=userData?.photoURL||currentUser?.photoURL||'';
    if(userData?.linkCode){
        document.getElementById('myLinkBox').style.display='block';
        document.getElementById('myLinkDisplay').textContent=getUserLink(userData.linkCode);
        document.getElementById('welcomeMsg').textContent='Bagikan link ini ke teman!';
    }
}

document.getElementById('logoutBtnMain').onclick=async()=>{
    if(currentUser)await db.collection('users').doc(currentUser.uid).update({status:'offline',lastSeen:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
    await auth.signOut();
};

// ===== THEME =====
function applyTheme(){const h=new Date().getHours();const s=localStorage.getItem('rc_theme');if(s==='dark'||(!s&&(h>=18||h<6))){document.documentElement.setAttribute('data-theme','dark');document.querySelector('#themeToggle i').className='fas fa-sun';}else{document.documentElement.removeAttribute('data-theme');document.querySelector('#themeToggle i').className='fas fa-moon';}}
applyTheme();setInterval(applyTheme,60000);
document.getElementById('themeToggle').onclick=function(){const d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');localStorage.setItem('rc_theme','light');this.querySelector('i').className='fas fa-moon';}else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('rc_theme','dark');this.querySelector('i').className='fas fa-sun';}};

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(b=>{b.onclick=function(){document.querySelectorAll('.tab-btn').forEach(x=>{x.classList.remove('active');});this.classList.add('active');const t=this.dataset.tab;document.getElementById('chatList').style.display=t==='chats'?'block':'none';document.getElementById('groupList').style.display=t==='groups'?'block':'none';if(t==='groups')loadGroups();};});

// ===== SEARCH =====
document.getElementById('searchInput').onkeypress=async function(e){if(e.key==='Enter'){const q=this.value.trim();if(!q)return;let u=null;if(q.includes('?=')){const code=q.split('?=')[1];u=await findUserByCode(code);}else{u=await findUserByUsername(q);}if(u&&u.uid!==currentUser?.uid){openPrivateChat(u.username);}else if(u&&u.uid===currentUser?.uid){showNotif('Itu kamu sendiri!','info');}else{showNotif('User tidak ditemukan','warning');}}};

// ===== GROUP =====
document.getElementById('submitGroupBtn').onclick=async function(){const n=document.getElementById('groupNameInput').value.trim();const er=document.getElementById('groupError');if(!n){er.textContent='Nama grup wajib';er.style.display='block';return;}this.disabled=true;try{const code=Array.from({length:20},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*62)]).join('');const ref=await db.collection('groups').add({name:n,createdBy:currentUser.uid,creatorName:userData?.username,inviteLink:code,members:[currentUser.uid],memberCount:1,admins:[currentUser.uid],maxMembers:MAX_MEMBERS,isActive:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});document.getElementById('createGroupModal').style.display='none';document.getElementById('groupNameInput').value='';showNotif('✅ Grup dibuat!','success');loadGroups();openGroupChat(ref.id);}catch(e){er.textContent='Gagal';er.style.display='block';}this.disabled=false;};
function loadGroups(){if(!currentUser)return;db.collection('groups').where('members','array-contains',currentUser.uid).where('isActive','==',true).orderBy('createdAt','desc').onSnapshot(snap=>{let h=`<div style="padding:12px;"><button onclick="document.getElementById('createGroupModal').style.display='flex'" style="width:100%;padding:12px;background:var(--p);color:white;border:none;border-radius:8px;cursor:pointer;"><i class="fas fa-plus"></i> Buat Grup Baru</button></div>`;if(snap.empty)h+=`<div style="padding:40px;text-align:center;color:var(--ts);">Belum ada grup</div>`;else snap.forEach(d=>{const g=d.data();h+=`<div class="chat-item" onclick="openGroupChat('${d.id}')"><div class="chat-avatar-placeholder">${g.name[0]}</div><div class="chat-content"><div class="chat-name">${g.name}</div><div class="chat-preview">${g.memberCount} anggota</div></div></div>`;});document.getElementById('groupList').innerHTML=h;});}
function openGroupChat(gid){currentGroupId=gid;activeChatType='group';activeChatId=gid;activeChatPartner=null;db.collection('groups').doc(gid).get().then(d=>{if(!d.exists)return;const g=d.data();document.getElementById('blankChat').style.display='none';document.getElementById('activeChat').style.display='flex';document.getElementById('groupInfoBtn').style.display='block';document.getElementById('chatPartnerName').textContent=g.name;document.getElementById('chatPartnerStatus').textContent=g.memberCount+' anggota';listenMessages(gid,'group');});}
document.getElementById('joinGroupBtn').onclick=async function(){const l=document.getElementById('inviteLinkInput').value.trim();if(!l||!currentUser)return;const s=await db.collection('groups').where('inviteLink','==',l).where('isActive','==',true).limit(1).get();if(s.empty){showNotif('Kode tidak valid','error');return;}const d=s.docs[0];const g=d.data();if(g.members.includes(currentUser.uid)){openGroupChat(d.id);return;}if(g.memberCount>=g.maxMembers){showNotif('Grup penuh!','error');return;}await db.collection('groups').doc(d.id).update({members:firebase.firestore.FieldValue.arrayUnion(currentUser.uid),memberCount:firebase.firestore.FieldValue.increment(1)});showNotif('✅ Gabung!','success');document.getElementById('inviteLinkInput').value='';openGroupChat(d.id);};

// ===== SEND MESSAGE =====
document.getElementById('sendBtn').onclick=sendMessage;
document.getElementById('messageInput').onkeypress=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
document.getElementById('closeChatBtn').onclick=()=>{if(messagesUnsubscribe){messagesUnsubscribe();messagesUnsubscribe=null;}document.getElementById('activeChat').style.display='none';document.getElementById('blankChat').style.display='flex';activeChatId=null;activeChatPartner=null;};
document.getElementById('messageInput').oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';};

async function sendMessage(){const input=document.getElementById('messageInput');const text=input.value.trim();if(!text||!currentUser||!activeChatId)return;if(isAICommand(text)){const q=extractQuestion(text);const ref=activeChatType==='group'?db.collection('groups').doc(activeChatId).collection('messages'):db.collection('chats').doc(activeChatId).collection('messages');const p=await ref.add({text:'🤔 AI berpikir...',senderUID:'ai',senderName:'AI',timestamp:firebase.firestore.FieldValue.serverTimestamp()});const a=await getAIResponse(q);await p.delete();await ref.add({text:a,senderUID:'ai',senderName:'🤖 AI',timestamp:firebase.firestore.FieldValue.serverTimestamp()});input.value='';return;}const msg={text,senderUID:currentUser.uid,senderName:userData?.username||'User',timestamp:firebase.firestore.FieldValue.serverTimestamp()};const ref=activeChatType==='group'?db.collection('groups').doc(activeChatId).collection('messages'):db.collection('chats').doc(activeChatId).collection('messages');if(activeChatType==='private')await db.collection('chats').doc(activeChatId).set({participants:[currentUser.uid,activeChatPartner.uid],lastMessage:text.substring(0,100),lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),lastSenderUID:currentUser.uid,[`unread_${activeChatPartner.uid}`]:firebase.firestore.FieldValue.increment(1)},{merge:true});await ref.add(msg);input.value='';input.style.height='auto';}

async function openPrivateChat(username){if(!currentUser)return;const u=await findUserByUsername(username);if(!u){showNotif('User tidak ditemukan','error');return;}if(u.uid===currentUser.uid){showNotif('Ini kamu sendiri!','info');return;}activeChatPartner=u;activeChatType='private';const uids=[currentUser.uid,u.uid].sort();activeChatId='private_'+uids[0]+'_'+uids[1];const cr=db.collection('chats').doc(activeChatId);const cd=await cr.get();if(!cd.exists)await cr.set({participants:[currentUser.uid,u.uid],participantData:{[currentUser.uid]:{username:userData?.username},[u.uid]:{username:u.username}},lastMessage:'',lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),[`unread_${currentUser.uid}`]:0,[`unread_${u.uid}`]:0});document.getElementById('blankChat').style.display='none';document.getElementById('activeChat').style.display='flex';document.getElementById('groupInfoBtn').style.display='none';document.getElementById('chatPartnerName').textContent=u.username;const pd=await db.collection('users').doc(u.uid).get();document.getElementById('chatPartnerStatus').textContent=pd.exists&&pd.data().status==='online'?'Online':'Offline';await cr.update({[`unread_${currentUser.uid}`]:0});listenMessages(activeChatId,'private');loadChats();}

function loadChats(){if(!currentUser)return;db.collection('chats').where('participants','array-contains',currentUser.uid).orderBy('lastMessageAt','desc').onSnapshot(snap=>{let h='';if(snap.empty)h=`<div style="padding:40px;text-align:center;color:var(--ts);"><i class="fas fa-inbox" style="font-size:48px;opacity:0.5;"></i><p>Belum ada chat</p></div>`;else snap.forEach(d=>{const c=d.data();const pid=c.participants.find(p=>p!==currentUser.uid);const pd=c.participantData?.[pid]||{};h+=`<div class="chat-item" onclick="openPrivateChatById('${pid}')"><div class="chat-avatar-placeholder">${(pd.username||'?')[0]}</div><div class="chat-content"><div class="chat-name">${pd.username||'Unknown'}</div><div class="chat-preview">${(c.lastMessage||'').substring(0,40)}</div></div></div>`;});document.getElementById('chatList').innerHTML=h;});}
async function openPrivateChatById(pid){if(!pid||pid===currentUser?.uid)return;const d=await db.collection('users').doc(pid).get();if(d.exists)openPrivateChat(d.data().username);}

function listenMessages(chatId,type){if(messagesUnsubscribe){messagesUnsubscribe();messagesUnsubscribe=null;}const ref=type==='group'?db.collection('groups').doc(chatId).collection('messages'):db.collection('chats').doc(chatId).collection('messages');messagesUnsubscribe=ref.orderBy('timestamp','asc').onSnapshot(snap=>{const list=document.getElementById('messagesList');if(!list)return;list.innerHTML='';snap.forEach(d=>{const m=d.data();const isMe=m.senderUID===currentUser?.uid;const time=m.timestamp?.toDate?.()?.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})||'';list.innerHTML+=`<div class="message-wrapper ${isMe?'sent':'received'}"><div class="message-bubble"><div class="message-text">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="message-meta"><span class="message-time">${time}</span></div></div></div>`;});const c=document.getElementById('messagesContainer');if(c)setTimeout(()=>c.scrollTop=c.scrollHeight,100);});}

// ===== URL PARAMETER =====
const codeFromURL=getCodeFromURL();
if(codeFromURL){console.log('🔗 Link detected:',codeFromURL);const check=setInterval(async()=>{if(currentUser&&userData?.username){clearInterval(check);const target=await findUserByCode(codeFromURL);if(target&&target.uid!==currentUser.uid){setTimeout(()=>openPrivateChat(target.username),1000);}}},500);setTimeout(()=>clearInterval(check),30000);}

// ===== PROFILE =====
document.getElementById('profileBtn').onclick=function(){if(!userData)return;const m=document.createElement('div');m.className='modal-overlay';m.innerHTML=`<div class="modal"><div class="modal-header"><h3>👤 Profil</h3><button class="icon-btn" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">Username</label><input type="text" id="editUsername" class="form-input" value="${userData.username||''}"><p id="editHint" style="font-size:11px;color:var(--ts);margin-top:4px;"></p></div><div class="form-group"><label class="form-label">Nama</label><input type="text" id="editName" class="form-input" value="${userData.displayName||''}"></div><button id="saveProfileBtn" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Simpan</button></div></div>`;document.body.appendChild(m);m.onclick=e=>{if(e.target===m)m.remove();};document.getElementById('editUsername').oninput=async function(){const v=this.value.trim();const h=document.getElementById('editHint');if(!v||v===userData.username){h.textContent='';return;}if(!/^[a-zA-Z0-9_]+$/.test(v)){h.textContent='❌ Hanya huruf, angka, underscore';return;}const ok=await isUsernameAvailable(v);h.textContent=ok?'✅ Tersedia':'❌ Sudah dipakai';h.style.color=ok?'#4caf50':'#ef5350';};document.getElementById('saveProfileBtn').onclick=async function(){const nu=document.getElementById('editUsername').value.trim();const nd=document.getElementById('editName').value.trim();if(!nu)return;this.disabled=true;try{if(nu!==userData.username){if(!await isUsernameAvailable(nu))throw new Error('Username sudah dipakai');if(userData.usernameLower)await db.collection('usernames').doc(userData.usernameLower).delete();await db.collection('usernames').doc(nu.toLowerCase()).set({uid:currentUser.uid,username:nu});}await db.collection('users').doc(currentUser.uid).update({username:nu,usernameLower:nu.toLowerCase(),displayName:nd});userData=(await db.collection('users').doc(currentUser.uid).get()).data();updateUI();showNotif('✅ Profil disimpan!','success');m.remove();}catch(e){showNotif(e.message,'error');}this.disabled=false;};};

document.onkeydown=e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());document.getElementById('createGroupModal').style.display='none';}};

console.log('🚀 RaflyChat SIAP!');
console.log('🔗 Link Acak Unik Per User AKTIF!');
</script>
