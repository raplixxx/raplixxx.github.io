<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Ahay Private Chat - vesta.ai">
    <title>Chat | Web Ahay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme chat-page">
    <!-- Header -->
    <header class="chat-header">
        <button id="menuToggle" class="icon-btn">
            <i class="fas fa-ellipsis-v"></i>
        </button>
        <div class="header-brand">
            <img src="vestlog.jpg" alt="vesta.ai" class="header-logo">
            <span class="header-title">Web Ahay Chat</span>
        </div>
        <div class="header-actions">
            <button id="shareChatBtn" class="icon-btn" title="Share Chat">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Chat History</h3>
            <button id="closeSidebarBtn" class="icon-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <button id="newChatBtn" class="sidebar-action-btn">
            <i class="fas fa-plus-circle"></i> New Chat
        </button>
        <div id="chatHistoryList" class="chat-history-list">
            <!-- Dynamic chat history -->
        </div>
        <button id="sidebarLogoutBtn" class="sidebar-action-btn logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <!-- Chat Container -->
    <main class="chat-container">
        <div id="messagesContainer" class="messages-container">
            <div class="welcome-message-chat">
                <div class="ai-avatar">
                    <img src="vestlog.jpg" alt="AI" class="avatar-img">
                </div>
                <div class="ai-message">
                    <p>Halo! Saya asisten AI dari vesta.ai. Ada yang bisa saya bantu?</p>
                </div>
            </div>
        </div>
        <div id="typingIndicator" class="typing-indicator" style="display: none;">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
            <span>AI is typing...</span>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="input-area">
        <form id="messageForm" class="message-form">
            <div class="input-wrapper">
                <textarea id="messageInput" class="message-input" placeholder="Ketik pesan Anda..." rows="1"></textarea>
                <button type="submit" class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </footer>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Bagikan Chat</h3>
                <button class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Link chat publik Anda:</p>
                <div class="share-link-box">
                    <input type="text" id="shareLinkInput" readonly>
                    <button id="copyShareLinkBtn" class="copy-btn">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/config.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
