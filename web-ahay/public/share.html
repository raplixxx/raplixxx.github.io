<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shared Chat - Web Ahay">
    <title>Shared Chat | Web Ahay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme share-page">
    <!-- Header -->
    <header class="share-header">
        <div class="header-brand">
            <img src="vestlog.jpg" alt="vesta.ai" class="header-logo">
            <span class="header-title">Shared Chat - Web Ahay</span>
        </div>
        <div class="share-badge">
            <i class="fas fa-eye"></i> Read Only
        </div>
    </header>

    <!-- Chat Container -->
    <main class="chat-container">
        <div id="sharedMessagesContainer" class="messages-container">
            <div class="loading-message">
                <div class="spinner"></div>
                <p>Loading shared chat...</p>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/config.js"></script>
    <script src="js/share.js"></script>
</body>
</html>
